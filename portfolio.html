<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Ratio Calc</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #ffffff; }
  body { color: #111; font-family: 'IBM Plex Sans', sans-serif; padding: 28px 16px 60px; }

  .page-header { max-width: 1100px; margin: 0 auto 22px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .page-title { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; }
  .page-subtitle { font-size: 12px; color: #777; }
  .sync-status { font-size: 11px; font-family: 'IBM Plex Mono', monospace; padding: 3px 8px; border-radius: 4px; }
  .sync-status.synced  { background: #edf7f2; color: #1a7a4a; }
  .sync-status.saving  { background: #fff8e0; color: #8a6a00; }
  .sync-status.error   { background: #fdedf0; color: #b83232; }

  table { max-width: 1100px; width: 100%; margin: 0 auto; border-collapse: collapse; border: 1.5px solid #1a1a1a; border-radius: 12px; overflow: hidden; box-shadow: 3px 3px 0 rgba(0,0,0,0.07); }
  col.c-ticker { width: 130px; }

  .row-header th { padding: 12px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; border-bottom: 1.5px solid #1a1a1a; text-align: left; }
  .row-header .c-ticker { background: #1a1a1a; border-right: 1.5px solid #1a1a1a; }
  .row-header .c-acct1  { background: #1a3fa8; border-right: 1px solid rgba(255,255,255,0.2); }
  .row-header .c-acct2  { background: #1a7a4a; border-right: 1px solid rgba(255,255,255,0.2); }
  .row-header .c-acct3  { background: #7a1a6a; }

  .row-summary td { border-bottom: 1.5px solid #1a1a1a; padding: 14px; vertical-align: middle; }
  .row-summary .c-ticker { background: #f7f7f7; border-right: 1.5px solid #1a1a1a; }
  .row-summary .c-acct1  { background: #fff;    border-right: 1px solid #ddd; }
  .row-summary .c-acct2  { background: #f2faf6; border-right: 1px solid #ddd; }
  .row-summary .c-acct3  { background: #faf2f9; }

  .s-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
  .s-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .s-value.blue   { color: #1a3fa8; }
  .s-value.green  { color: #1a7a4a; }
  .s-value.purple { color: #7a1a6a; }
  .budget-wrap { display: flex; align-items: center; gap: 1px; }
  .budget-dollar-green  { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: #1a7a4a; }
  .budget-dollar-purple { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: #7a1a6a; }
  .budget-input { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; background: transparent; border: none; outline: none; width: 100%; padding: 0; }
  .budget-input.green  { color: #1a7a4a; }
  .budget-input.purple { color: #7a1a6a; }
  .budget-input.green::placeholder  { color: #a0c8b8; font-weight: 400; font-size: 16px; }
  .budget-input.purple::placeholder { color: #c8a0c4; font-weight: 400; font-size: 16px; }
  .s-note { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-top: 5px; }
  .s-note.green  span { color: #1a7a4a; }
  .s-note.purple span { color: #7a1a6a; }
  .last-updated { font-size: 10px; color: #aaa; font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }

  .row-stock td { border-bottom: 1px solid #e8e8e8; padding: 10px 14px; vertical-align: middle; }
  .row-stock .c-ticker { background: #f7f7f7; border-right: 1.5px solid #1a1a1a; }
  .row-stock .c-acct1  { background: #fff;    border-right: 1px solid #e8e8e8; }
  .row-stock .c-acct2  { background: #f2faf6; border-right: 1px solid #e8e8e8; }
  .row-stock .c-acct3  { background: #faf2f9; }

  .ticker-input { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; background: transparent; border: none; outline: none; color: #111; width: 100%; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .ticker-input::placeholder { color: #ccc; font-weight: 400; text-transform: none; }
  .price-wrap { display: flex; align-items: center; gap: 3px; }
  .price-sym { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #999; }
  .price-input { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #888; background: transparent; border: none; border-bottom: 1px dashed #ccc; outline: none; width: 100%; padding: 1px 0; }
  .price-input::placeholder { color: #ccc; }
  .price-input:focus { border-bottom-color: #1a3fa8; color: #111; }
  .price-input.live { color: #1a7a4a; border-bottom-color: #1a7a4a; }

  .shares-input { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; background: transparent; border: none; border-bottom: 1.5px solid transparent; outline: none; color: #111; width: 100%; padding: 1px 0; display: block; margin-bottom: 6px; }
  .shares-input:focus { border-bottom-color: #1a3fa8; }
  .shares-input::placeholder { color: #ccc; font-weight: 400; font-size: 13px; }

  .cell-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 13px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .badge-blue   { background: #edf1fb; color: #1a3fa8; }
  .badge-green  { background: #edf7f2; color: #1a7a4a; }
  .badge-purple { background: #f7edf6; color: #7a1a6a; }

  .result-shares { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 600; display: block; margin-bottom: 6px; }
  .result-shares.green  { color: #1a7a4a; }
  .result-shares.purple { color: #7a1a6a; }
  .result-shares.empty  { font-size: 12px; font-weight: 400; color: #bbb; }

  .row-cash td { border-bottom: 1.5px solid #1a1a1a; padding: 10px 14px; vertical-align: middle; }
  .row-cash .c-ticker { background: #fffbea; border-right: 1.5px solid #1a1a1a; }
  .row-cash .c-acct1  { background: #fffbea; border-right: 1px solid #e8dfa0; }
  .row-cash .c-acct2  { background: #f4fbf0; border-right: 1px solid #e8e8e8; }
  .row-cash .c-acct3  { background: #fbf0fa; }
  .cash-input { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; background: transparent; border: none; border-bottom: 1.5px solid transparent; outline: none; color: #111; width: 100%; padding: 1px 0; display: block; margin-bottom: 6px; }
  .cash-input:focus { border-bottom-color: #8a7a00; }
  .cash-input::placeholder { color: #ccc; font-weight: 400; font-size: 13px; }

  .row-footer td { padding: 10px 14px; vertical-align: middle; }
  .row-footer .c-ticker { background: #f7f7f7; border-right: 1.5px solid #1a1a1a; }
  .row-footer .c-acct1  { background: #fff;    border-right: 1px solid #ddd; }
  .row-footer .c-acct2  { background: #f2faf6; border-right: 1px solid #ddd; }
  .row-footer .c-acct3  { background: #faf2f9; }

  .btn { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; border: 1.5px solid #1a1a1a; border-radius: 6px; padding: 6px 14px; cursor: pointer; background: white; color: #111; transition: all 0.15s; }
  .btn:hover { background: #1a1a1a; color: white; }
  .btn-sort    { border-color: #555; color: #555; }
  .btn-sort:hover    { background: #555; color: white; }
  .btn-refresh { border-color: #1a7a4a; color: #1a7a4a; }
  .btn-refresh:hover { background: #1a7a4a; color: white; }

  .header-input { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3); outline: none; width: 100%; padding: 1px 0; cursor: text; }

  @media (max-width: 700px) {
    col.c-ticker { width: 90px; }
    .s-value { font-size: 15px; }
    .result-shares { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">// PORTFOLIO RATIO CALC</div>
  <div class="page-subtitle">US Equities · Live prices · Cloud sync</div>
  <div class="sync-status synced" id="sync-status">✓ Synced</div>
</div>

<table>
  <colgroup>
    <col class="c-ticker">
    <col class="c-acct1">
    <col class="c-acct2">
    <col class="c-acct3">
  </colgroup>
  <thead>
    <tr class="row-header">
      <th class="c-ticker">Ticker</th>
      <th class="c-acct1"><input class="header-input" id="h-acct1" value="Account 1 — Reference" oninput="saveData()"></th>
      <th class="c-acct2"><input class="header-input" id="h-acct2" value="Account 2 — Target" oninput="saveData()"></th>
      <th class="c-acct3"><input class="header-input" id="h-acct3" value="Account 3 — Target" oninput="saveData()"></th>
    </tr>
  </thead>
  <tbody>
    <tr class="row-summary">
      <td class="c-ticker">
        <div style="font-size:11px;color:#aaa;font-family:monospace">—</div>
        <div class="last-updated" id="last-updated"></div>
        <button class="btn btn-sort" onclick="sortAlpha()" style="margin-top:8px;width:100%;">A→Z Sort</button>
      </td>
      <td class="c-acct1">
        <div class="s-label">Total Value</div>
        <div class="s-value blue" id="acct1-total">$0.00</div>
      </td>
      <td class="c-acct2">
        <div class="s-label">Target Budget</div>
        <div class="budget-wrap">
          <span class="budget-dollar-green">$</span>
          <input type="number" id="acct2-budget" class="budget-input green" placeholder="10000" oninput="recalc();saveData()">
        </div>
        <div class="s-note green">Allocated: <span id="acct2-allocated">$0.00</span></div>
      </td>
      <td class="c-acct3">
        <div class="s-label">Target Budget</div>
        <div class="budget-wrap">
          <span class="budget-dollar-purple">$</span>
          <input type="number" id="acct3-budget" class="budget-input purple" placeholder="10000" oninput="recalc();saveData()">
        </div>
        <div class="s-note purple">Allocated: <span id="acct3-allocated">$0.00</span></div>
      </td>
    </tr>

    <tr class="row-cash" id="cash-row">
      <td class="c-ticker">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#7a6000;margin-bottom:3px;">CASH</div>
        <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#b8a040;">USD</div>
      </td>
      <td class="c-acct1">
        <div class="price-wrap" style="margin-bottom:6px;">
          <span class="price-sym">$</span>
          <input type="number" id="cash1" class="cash-input" placeholder="0.00" step="0.01" oninput="recalc();saveData()">
        </div>
        <div class="cell-sub">
          <span id="cash1-sub">—</span>
          <span class="badge badge-blue" id="cash1-pct"></span>
        </div>
      </td>
      <td class="c-acct2">
        <div class="result-shares green empty" id="cash2-amount">Enter budget →</div>
        <div class="cell-sub"><span class="badge badge-green" id="cash2-pct"></span></div>
      </td>
      <td class="c-acct3">
        <div class="result-shares purple empty" id="cash3-amount">Enter budget →</div>
        <div class="cell-sub"><span class="badge badge-purple" id="cash3-pct"></span></div>
      </td>
    </tr>

    <tr class="row-footer">
      <td class="c-ticker">
        <button class="btn" onclick="addRow()">+ Add</button>
      </td>
      <td class="c-acct1"></td>
      <td class="c-acct2">
        <button class="btn btn-refresh" onclick="refreshAllPrices()">↻ Refresh Prices</button>
      </td>
      <td class="c-acct3"></td>
    </tr>
  </tbody>
</table>

<!-- Firebase -->
<style>
  #login-screen {
    position: fixed; inset: 0; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 20px;
  }
  #login-screen h1 { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; }
  #login-screen p  { font-size: 13px; color: #777; }
  #google-login-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px; border: 1.5px solid #1a1a1a; border-radius: 8px;
    background: white; cursor: pointer; font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600; transition: all .15s;
  }
  #google-login-btn:hover { background: #1a1a1a; color: white; }
  #user-bar {
    display: none; align-items: center; gap: 10px;
    position: absolute; top: 16px; right: 16px;
  }
  #user-bar img { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ddd; }
  #user-bar span { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: #777; }
  #logout-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    border: 1px solid #ddd; border-radius: 4px; padding: 4px 10px; cursor: pointer;
    background: white; color: #777; }
  #logout-btn:hover { border-color: #b83232; color: #b83232; }
  .page-header { position: relative; }
</style>

<!-- Login screen -->
<div id="login-screen">
  <h1>// PORTFOLIO RATIO CALC</h1>
  <p>Google 계정으로 로그인하여 데이터를 불러오세요</p>
  <button id="google-login-btn" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36 24 36c-5.2 0-9.6-3-11.3-7.3l-6.5 5C9.5 39.6 16.3 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.5l6.2 5.2C41 35.2 44 30 44 24c0-1.3-.1-2.7-.4-4z"/>
    </svg>
    Google로 로그인
  </button>
</div>

<!-- User bar (shown after login) -->
<div id="user-bar">
  <img id="user-photo" src="" onerror="this.style.display='none'">
  <span id="user-name"></span>
  <button id="logout-btn" onclick="googleLogout()">로그아웃</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCwUS9-uzZtmXzeIC-dDKcPJvrSbndL7L8",
    authDomain: "portfolio-e7706.firebaseapp.com",
    databaseURL: "https://portfolio-e7706-default-rtdb.firebaseio.com",
    projectId: "portfolio-e7706",
    storageBucket: "portfolio-e7706.firebasestorage.app",
    messagingSenderId: "256442360821",
    appId: "1:256442360821:web:cba2f574b3099da79936bc"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let DB_REF = null;
  let unsubscribe = null;

  // Google 로그인
  window.googleLogin = async function() {
    try { await signInWithPopup(auth, provider); }
    catch(e) { alert('로그인 실패: ' + e.message); }
  };

  // 로그아웃
  window.googleLogout = async function() {
    if (unsubscribe) unsubscribe();
    await signOut(auth);
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'none';
  };

  // Auth 상태 감지
  onAuthStateChanged(auth, user => {
    if (user) {
      // 로그인됨
      document.getElementById('login-screen').style.display = 'none';
      const bar = document.getElementById('user-bar');
      bar.style.display = 'flex';
      document.getElementById('user-photo').src = user.photoURL || '';
      document.getElementById('user-name').textContent = user.displayName || user.email;

      // 유저별 DB 경로
      DB_REF = ref(db, 'portfolio');
      startListening();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('user-bar').style.display = 'none';
    }
  });

  function startListening() {
    if (unsubscribe) unsubscribe();
    unsubscribe = onValue(DB_REF, (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        rows = DEFAULT_ROWS.map(x => ({...x}));
        renderRows();
        return;
      }
      isLoading = true;
      rows = data.rows || DEFAULT_ROWS.map(x => ({...x}));
      if (data.budget2) document.getElementById('acct2-budget').value = data.budget2;
      if (data.budget3) document.getElementById('acct3-budget').value = data.budget3;
      if (data.cash1)   document.getElementById('cash1').value = data.cash1;
      if (data.h1)      document.getElementById('h-acct1').value = data.h1;
      if (data.h2)      document.getElementById('h-acct2').value = data.h2;
      if (data.h3)      document.getElementById('h-acct3').value = data.h3;
      isLoading = false;
      renderRows();
      setSyncStatus('synced');
    });
  }

  const FINNHUB_KEY = 'd803iupr01qj3ct8tn40d803iupr01qj3ct8tn4g';

  const DEFAULT_ROWS = [
    { ticker: 'AAPL', price: '', shares1: '10' },
    { ticker: 'NVDA', price: '', shares1: '5'  },
    { ticker: 'MSFT', price: '', shares1: '8'  },
    { ticker: 'TSLA', price: '', shares1: '15' },
    { ticker: '',     price: '', shares1: ''   },
  ];

  window.rows = [];
  let rows = window.rows;
  let fetchTimer = {};
  let saveTimer  = null;
  let isLoading  = false;

  function setSyncStatus(status) {
    const el = document.getElementById('sync-status');
    el.className = 'sync-status ' + status;
    el.textContent = status === 'synced' ? '✓ Synced' : status === 'saving' ? '↑ Saving...' : '✕ Error';
  }

  // ── Save to Firebase (debounced) ──
  window.saveData = function() {
    clearTimeout(saveTimer);
    setSyncStatus('saving');
    saveTimer = setTimeout(async () => {
      try {
        const data = {
          rows,
          budget2: document.getElementById('acct2-budget').value,
          budget3: document.getElementById('acct3-budget').value,
          cash1:   document.getElementById('cash1').value,
          h1:      document.getElementById('h-acct1').value,
          h2:      document.getElementById('h-acct2').value,
          h3:      document.getElementById('h-acct3').value,
        };
        if (!DB_REF) return;
        await set(DB_REF, data);
        setSyncStatus('synced');
      } catch(e) {
        setSyncStatus('error');
      }
    }, 800);
  };



  // ── Formatting ──
  function fmt$(n) {
    const num = parseFloat(n);
    if (isNaN(num)) return '—';
    return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function getTotal1() {
    const stockTotal = rows.reduce((s, r) => {
      const v = parseFloat(r.price) * parseFloat(r.shares1);
      return s + (isNaN(v) ? 0 : v);
    }, 0);
    return stockTotal + (parseFloat(document.getElementById('cash1').value) || 0);
  }

  // ── Recalc ──
  window.recalc = function() {
    const total1  = getTotal1();
    const budget2 = parseFloat(document.getElementById('acct2-budget').value) || 0;
    const budget3 = parseFloat(document.getElementById('acct3-budget').value) || 0;
    document.getElementById('acct1-total').textContent = fmt$(total1);
    let alloc2 = 0, alloc3 = 0;

    rows.forEach((r, i) => {
      const price = parseFloat(r.price), shares1 = parseFloat(r.shares1);
      const val1  = isNaN(price * shares1) ? 0 : price * shares1;
      const pct   = total1 > 0 ? val1 / total1 : 0;

      const sub1 = document.getElementById(`sub1-${i}`);
      const pct1 = document.getElementById(`pct1-${i}`);
      if (sub1) sub1.textContent = val1 > 0 ? fmt$(val1) : '—';
      if (pct1) pct1.textContent = (total1 > 0 && val1 > 0) ? (pct*100).toFixed(1)+'%' : '';

      ['2','3'].forEach(n => {
        const budget = n === '2' ? budget2 : budget3;
        const res  = document.getElementById(`res${n}-${i}`);
        const sub  = document.getElementById(`sub${n}-${i}`);
        const pctEl= document.getElementById(`pct${n}-${i}`);
        if (!res) return;
        if (budget > 0 && price > 0 && pct > 0) {
          const tv  = pct * budget;
          const shs = tv / price;
          if (n === '2') alloc2 += tv; else alloc3 += tv;
          res.className = `result-shares ${n === '2' ? 'green' : 'purple'}`;
          res.innerHTML = `${shs.toFixed(2)} <span style="font-size:10px;font-weight:400;color:#aaa">shs</span>`;
          if (sub)   sub.textContent  = fmt$(tv);
          if (pctEl) pctEl.textContent= (pct*100).toFixed(1)+'%';
        } else {
          res.className = 'result-shares empty';
          res.textContent = budget > 0 ? '—' : 'Enter budget →';
          if (sub)   sub.textContent  = '';
          if (pctEl) pctEl.textContent= '';
        }
      });
    });

    // Cash
    const cv   = parseFloat(document.getElementById('cash1').value) || 0;
    const cpct = total1 > 0 ? cv / total1 : 0;
    document.getElementById('cash1-sub').textContent = cv > 0 ? fmt$(cv) : '—';
    document.getElementById('cash1-pct').textContent = (cv > 0 && total1 > 0) ? (cpct*100).toFixed(1)+'%' : '';

    ['2','3'].forEach(n => {
      const budget = n === '2' ? budget2 : budget3;
      const amtEl  = document.getElementById(`cash${n}-amount`);
      const pctEl  = document.getElementById(`cash${n}-pct`);
      if (budget > 0 && cpct > 0) {
        const t = cpct * budget;
        if (n === '2') alloc2 += t; else alloc3 += t;
        amtEl.className = `result-shares ${n === '2' ? 'green' : 'purple'}`;
        amtEl.textContent = fmt$(t);
        pctEl.textContent = (cpct*100).toFixed(1)+'%';
      } else {
        amtEl.className = 'result-shares empty';
        amtEl.textContent = budget > 0 ? '—' : 'Enter budget →';
        pctEl.textContent = '';
      }
    });

    document.getElementById('acct2-allocated').textContent = fmt$(alloc2);
    document.getElementById('acct3-allocated').textContent = fmt$(alloc3);
  };

  // ── Row update helpers (accessible from inline handlers) ──
  window.updateTicker = function(i, val) {
    rows[i].ticker = val.toUpperCase();
    document.getElementById('ticker-'+i).value = val.toUpperCase();
    saveData();
  };
  window.updatePrice = function(i, val) {
    rows[i].price = val;
    recalc();
    saveData();
  };
  window.updateShares = function(i, val) {
    rows[i].shares1 = val;
    recalc();
    saveData();
  };

  // ── Render rows ──
  window.renderRows = function() {
    document.querySelectorAll('.row-stock').forEach(r => r.remove());
    const cashRow = document.getElementById('cash-row');
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.className = 'row-stock';
      tr.innerHTML = `
        <td class="c-ticker">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
            <input class="ticker-input" type="text" placeholder="TICKER" maxlength="6"
              id="ticker-${i}" value="${r.ticker}" style="margin-bottom:0;"
              oninput="updateTicker(${i},this.value)"
              onblur="onTickerBlur(${i})">
            <button onclick="deleteRow(${i})" style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;background:none;border:none;color:#ccc;cursor:pointer;padding:0 0 0 4px;" onmouseover="this.style.color='#b83232'" onmouseout="this.style.color='#ccc'">×</button>
          </div>
          <div class="price-wrap">
            <span class="price-sym">$</span>
            <input class="price-input" type="number" placeholder="0.00" step="0.01"
              id="price-${i}" value="${r.price}"
              oninput="updatePrice(${i},this.value)">
          </div>
        </td>
        <td class="c-acct1">
          <input class="shares-input" type="number" placeholder="# shares" step="0.001"
            value="${r.shares1}"
            oninput="updateShares(${i},this.value)">
          <div class="cell-sub">
            <span id="sub1-${i}">—</span>
            <span class="badge badge-blue" id="pct1-${i}"></span>
          </div>
        </td>
        <td class="c-acct2">
          <span class="result-shares green empty" id="res2-${i}">Enter budget →</span>
          <div class="cell-sub">
            <span id="sub2-${i}"></span>
            <span class="badge badge-green" id="pct2-${i}"></span>
          </div>
        </td>
        <td class="c-acct3">
          <span class="result-shares purple empty" id="res3-${i}">Enter budget →</span>
          <div class="cell-sub">
            <span id="sub3-${i}"></span>
            <span class="badge badge-purple" id="pct3-${i}"></span>
          </div>
        </td>
      `;
      cashRow.insertAdjacentElement('beforebegin', tr);
    });
    recalc();
  };

  // ── Price fetching ──
  async function fetchPrice(ticker, index) {
    if (!ticker) return;
    const priceEl = document.getElementById(`price-${index}`);

    // Use Finnhub without custom headers to avoid CORS preflight
    try {
      const res  = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`);
      const data = await res.json();
      if (data && data.c && data.c > 0) {
        rows[index].price = data.c.toString();
        if (priceEl) {
          priceEl.value = data.c.toFixed(2);
          priceEl.classList.add('live');
          setTimeout(() => priceEl.classList.remove('live'), 2000);
        }
        recalc();
        saveData();
        const t = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('last-updated').textContent = 'Updated ' + t;
      }
    } catch(e) {}
  }

  window.refreshAllPrices = async function() {
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].ticker) await fetchPrice(rows[i].ticker, i);
    }
  };

  window.onTickerBlur = function(i) {
    const ticker = rows[i].ticker;
    if (ticker) {
      clearTimeout(fetchTimer[i]);
      fetchTimer[i] = setTimeout(() => fetchPrice(ticker, i), 300);
    }
  };

  window.sortAlpha = function() {
    rows.sort((a, b) => {
      if (!a.ticker && !b.ticker) return 0;
      if (!a.ticker) return 1;
      if (!b.ticker) return -1;
      return a.ticker.localeCompare(b.ticker);
    });
    renderRows();
    saveData();
  };

  window.deleteRow = function(i) {
    if (rows.length > 1) { rows.splice(i, 1); renderRows(); saveData(); }
  };

  window.addRow = function() {
    rows.push({ ticker: '', price: '', shares1: '' });
    renderRows();
    saveData();
  };
</script>
</body>
</html>
